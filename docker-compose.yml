version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tamilisai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tamilisai
      POSTGRES_PASSWORD: tamilisai_secret
      POSTGRES_DB: tamilisai
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
